services:
  avdb-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: avdb-server:latest
    container_name: avdb-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化（DB + 图片缓存 + 爬取状态）
      - avdb_data:/app/data
      # 开发时挂载源码（生产注释掉）
      # - ./backend:/app/backend
      # - ./magnet_scraper:/app/magnet_scraper
    environment:
      - AUTH_DISABLED=false             # 生产环境必须 false
      - SECRET_KEY=${SECRET_KEY:-}      # 留空则首次启动自动生成随机密钥持久化到 data/.secret_key
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}  # 留空则首次启动自动生成随机密码(日志中打印一次)
      - JAVDB_URL=https://javdb.com
      - DATABASE_URL=                 # 空则用默认 SQLite /app/data/javdb.db
      - DEBUG=false
      # 代理（Playwright 访问 javdb 用）
      - HTTP_PROXY=
      - HTTPS_PROXY=
      # - http_proxy=http://192.168.x.x:port
      # - https_proxy=http://192.168.x.x:port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  avdb_data:
